name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint markdown
        run: npx markdownlint-cli "**/*.md" --ignore node_modules

      - name: Lint app
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build app
        run: npm run build
